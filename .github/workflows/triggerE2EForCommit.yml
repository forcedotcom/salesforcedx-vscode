name: Direct E2E Tests
on:
  workflow_call:
    inputs:
      vscodeVersion:
        description: 'VSCode Version'
        required: false
        type: string
      runId:
        description: 'Run ID of the workflow run that created the vsixes'
        required: true
        type: string

jobs:
  # anInitialSuite.e2e.ts removed — empty-workspace / no-org palette coverage is Playwright (metadataE2E.yml:
  # emptyWorkspaceSfdxCommands.desktop.spec.ts, createProject.desktop.spec.ts; org: orgCommands.desktop.spec.ts)

  # 🔧 Core Features
  # core-authentication: migrated to Playwright in orgE2E.yml (orgPicker.desktop.spec.ts)

  # core-create-project: migrated to Playwright in metadataE2E.yml (createProject.desktop.spec.ts)

  # core-sobjects-definitions: removed (sObjectsDefinitions.e2e.ts deleted)
  # core-org-browser: removed (orgBrowser.e2e.ts deleted; new org browser has Playwright tests)

  # core-snippets: migrated to Playwright — packages/salesforcedx-vscode-lwc (test:web / test:desktop)

  # 📦 Deploy & Retrieve — now covered by core Playwright tests (manifestBuilder, deployAndRetrieve, metadataDeployRetrieve, pushAndPull)

  # 🐛 Apex Features
  # apex-lsp: migrated to Playwright in apexLspE2E.yml

  # apex-run-tests: migrated to Playwright in apexTestingE2E.yml (runApexTestsCommandPalette/CodeLens/FailAndFix.headless.spec.ts)

  # apex-debug-tests: migrated to Playwright in apexReplayDebuggerE2E.yml (debugApexTests.desktop.spec.ts) — W-22968398

  # apex-trail-replay-debugger: migrated to Playwright in apexReplayDebuggerE2E.yml (checkpoints.desktop.spec.ts) — W-21368925

  # ⚡ LWC Features
  # lwc-lsp: migrated to Playwright in lwcPlaywrightE2E.yml (lwcLspIndexing, lwcLspGoToDefinitionJs, lwcLspGoToDefinitionHtml, lwcLspAutocompletion)
  # lwc-run-tests: migrated to Playwright in lwcPlaywrightE2E.yml (e2e-desktop-run-tests via lwcRunTests.desktop.spec.ts)
  # lwc-debug-tests: migrated to Playwright in lwcPlaywrightE2E.yml (e2e-desktop-debug-tests via lwcDebugTests.desktop.spec.ts)

  # 🔥 Aura Features
  aura-lsp:
    uses: ./.github/workflows/runE2ETest.yml
    secrets: inherit
    with:
      testToRun: 'auraLsp.e2e.js'
      vscodeVersion: ${{ inputs.vscodeVersion || vars.MAX_REDHAT_VSCODE_VERSION || 'latest' }}
      runId: ${{ inputs.runId }}

  # 📄 Visualforce Features — migrated to Playwright in visualforceE2E.yml

  # 🔍 SOQL Features - migrated to Playwright in soqlE2E.yml

  # 📋 Templates - migrated to Playwright in coreE2E.yml (auraTemplates, visualforceTemplates, analyticsTemplates)

  # 📚 OpenAPI Documentation - migrated to Playwright in apexOasE2E.yml
