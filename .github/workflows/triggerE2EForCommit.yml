name: Direct E2E Tests
on:
  workflow_call:
    inputs:
      vscodeVersion:
        description: 'VSCode Version'
        required: false
        type: string
      runId:
        description: 'Run ID of the workflow run that created the vsixes'
        required: true
        type: string

jobs:
  # anInitialSuite.e2e.ts removed — empty-workspace / no-org palette coverage is Playwright (coreE2E.yml:
  # emptyWorkspaceSfdxCommands.desktop.spec.ts, createProject.headless.spec.ts; org: orgCommands.desktop.spec.ts)

  # 🔧 Core Features
  core-authentication:
    uses: ./.github/workflows/runE2ETest.yml
    secrets: inherit
    with:
      testToRun: 'authentication.e2e.js'
      vscodeVersion: ${{ inputs.vscodeVersion || vars.MAX_REDHAT_VSCODE_VERSION || 'latest' }}
      runId: ${{ inputs.runId }}

  # core-create-project: migrated to Playwright in coreE2E.yml (createProject.headless.spec.ts)

  # core-sobjects-definitions: removed (sObjectsDefinitions.e2e.ts deleted)
  # core-org-browser: removed (orgBrowser.e2e.ts deleted; new org browser has Playwright tests)

  core-snippets:
    uses: ./.github/workflows/runE2ETest.yml
    secrets: inherit
    with:
      testToRun: 'snippets.e2e.js'
      vscodeVersion: ${{ inputs.vscodeVersion || vars.MAX_REDHAT_VSCODE_VERSION || 'latest' }}
      runId: ${{ inputs.runId }}

  # 📦 Deploy & Retrieve — now covered by core Playwright tests (manifestBuilder, deployAndRetrieve, metadataDeployRetrieve, pushAndPull)

  # 🐛 Apex Features
  apex-lsp:
    uses: ./.github/workflows/runE2ETest.yml
    secrets: inherit
    with:
      testToRun: 'apexLsp.e2e.js'
      vscodeVersion: ${{ inputs.vscodeVersion || vars.MAX_REDHAT_VSCODE_VERSION || 'latest' }}
      runId: ${{ inputs.runId }}

  apex-run-tests:
    uses: ./.github/workflows/runE2ETest.yml
    secrets: inherit
    with:
      testToRun: 'runApexTests.e2e.js'
      vscodeVersion: ${{ inputs.vscodeVersion || vars.MAX_REDHAT_VSCODE_VERSION || 'latest' }}
      runId: ${{ inputs.runId }}

  apex-debug-tests:
    uses: ./.github/workflows/runE2ETest.yml
    secrets: inherit
    with:
      testToRun: 'debugApexTests.e2e.js'
      vscodeVersion: ${{ inputs.vscodeVersion || vars.MAX_REDHAT_VSCODE_VERSION || 'latest' }}
      runId: ${{ inputs.runId }}

  apex-trail-replay-debugger:
    if: false
    uses: ./.github/workflows/runE2ETest.yml
    secrets: inherit
    with:
      testToRun: 'trailApexReplayDebugger.e2e.js'
      vscodeVersion: ${{ inputs.vscodeVersion || vars.MAX_REDHAT_VSCODE_VERSION || 'latest' }}
      runId: ${{ inputs.runId }}

  # ⚡ LWC Features
  lwc-lsp:
    uses: ./.github/workflows/runE2ETest.yml
    secrets: inherit
    with:
      testToRun: 'lwcLsp.e2e.js'
      vscodeVersion: ${{ inputs.vscodeVersion || vars.MAX_REDHAT_VSCODE_VERSION || 'latest' }}
      runId: ${{ inputs.runId }}

  lwc-run-tests:
    uses: ./.github/workflows/runE2ETest.yml
    secrets: inherit
    with:
      testToRun: 'runLwcTests.e2e.js'
      vscodeVersion: ${{ inputs.vscodeVersion || vars.MAX_REDHAT_VSCODE_VERSION || 'latest' }}
      runId: ${{ inputs.runId }}

  lwc-debug-tests:
    uses: ./.github/workflows/runE2ETest.yml
    secrets: inherit
    with:
      testToRun: 'debugLwcTests.e2e.js'
      vscodeVersion: ${{ inputs.vscodeVersion || vars.MAX_REDHAT_VSCODE_VERSION || 'latest' }}
      runId: ${{ inputs.runId }}

  # 🔥 Aura Features
  aura-lsp:
    uses: ./.github/workflows/runE2ETest.yml
    secrets: inherit
    with:
      testToRun: 'auraLsp.e2e.js'
      vscodeVersion: ${{ inputs.vscodeVersion || vars.MAX_REDHAT_VSCODE_VERSION || 'latest' }}
      runId: ${{ inputs.runId }}

  # 📄 Visualforce Features - migrated to Playwright in visualforceE2E.yml

  # 🔍 SOQL Features - migrated to Playwright in soqlE2E.yml

  # 📋 Templates - migrated to Playwright in coreE2E.yml (auraTemplates, visualforceTemplates, analyticsTemplates)

  # Commenting out since it's broken
  # # 📚 OpenAPI Documentation
  # docs-create-oas-doc:
  #   uses: ./.github/workflows/runE2ETest.yml
  #   secrets: inherit
  #   with:
  #     testToRun: 'createOasDoc.e2e.js'
  #     vscodeVersion: ${{ inputs.vscodeVersion || vars.MAX_REDHAT_VSCODE_VERSION || 'latest' }}
  #     runId: ${{ inputs.runId }}
  #     os: '["ubuntu-latest"]'
