name: Commit Workflow
on:
  push:
    branches-ignore: [main, develop]

jobs:
  build-and-test:
    uses: ./.github/workflows/buildAndTest.yml
  e2e-tests:
    needs: build-and-test
    uses: ./.github/workflows/triggerE2EForCommit.yml
    secrets: inherit
    with:
      vscodeVersion: ${{ vars.MAX_REDHAT_VSCODE_VERSION }}
      runId: ${{ github.run_id }}
