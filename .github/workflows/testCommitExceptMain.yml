name: Commit Workflow
on:
  push:
    branches-ignore: [main, develop, sm/W-21313309-add-ubuntu-playwright-vscode-ext]
    paths-ignore:
      - '.claude/**'
      - '.cursor/**'
      - 'contributing/**'
      - 'CONTRIBUTING.md'
      - 'docs/**'
      - '**/README*'
      - 'SECURITY*'
      - 'CODE_OF_CONDUCT*'
      - 'CHANGELOG*'
      - '**/CHANGELOG*'

jobs:
  build-and-test:
    uses: ./.github/workflows/buildAndTest.yml
  e2e-tests:
    needs: build-and-test
    uses: ./.github/workflows/triggerE2EForCommit.yml
    secrets: inherit
    with:
      vscodeVersion: ${{ vars.MAX_REDHAT_VSCODE_VERSION || 'latest' }}
      runId: ${{ github.run_id }}
