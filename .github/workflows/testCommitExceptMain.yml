name: Commit Workflow
on:
  push:
    branches-ignore: [main, develop]
    paths-ignore:
      - '.claude/**'
      - '.cursor/**'
      - 'contributing/**'
      - 'CONTRIBUTING.md'
      - 'docs/**'
      - '**/README*'
      - 'SECURITY*'
      - 'CODE_OF_CONDUCT*'
      - 'CHANGELOG*'
      - '**/CHANGELOG*'

jobs:
  build-and-test:
    uses: ./.github/workflows/buildAndTest.yml
