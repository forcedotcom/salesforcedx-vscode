name: Apex End to End Tests

on:
  workflow_dispatch:
    inputs:
      apexLsp:
        description: 'Apex LSP'
        required: false
        default: true
        type: boolean
      debugApexTests:
        description: 'Debug Apex Tests'
        required: false
        default: true
        type: boolean
      vscodeVersion:
        description: 'VSCode Version'
        required: false
        default: 'latest'
        type: string
      runId:
        description: 'Run ID of the workflow run that created the vsixes'
        required: true
        type: string

  workflow_call:
    inputs:
      apexLsp:
        description: 'Apex LSP'
        required: false
        default: true
        type: boolean
      debugApexTests:
        description: 'Debug Apex Tests'
        required: false
        default: true
        type: boolean
      vscodeVersion:
        description: 'VSCode Version'
        required: false
        default: 'latest'
        type: string
      runId:
        description: 'Run ID of the workflow run that created the vsixes'
        required: true
        type: string

jobs:
  apexLSP:
    if: ${{ inputs.apexLsp }}
    uses: ./.github/workflows/runE2ETest.yml
    secrets: inherit
    with:
      testToRun: 'apexLsp.e2e.js'
      vscodeVersion: ${{ inputs.vscodeVersion }}
      runId: ${{ inputs.runId }}

  debugApexTests:
    if: ${{ inputs.debugApexTests }}
    uses: ./.github/workflows/runE2ETest.yml
    secrets: inherit
    with:
      testToRun: 'debugApexTests.e2e.js'
      vscodeVersion: ${{ inputs.vscodeVersion }}
      runId: ${{ inputs.runId }}

  # runApexTests: migrated to Playwright in apexTestingE2E.yml (runApexTestsCommandPalette/CodeLens/FailAndFix.headless.spec.ts)
