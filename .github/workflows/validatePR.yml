name: Validate PR
on:
  pull_request:
    types: [opened, reopened, edited, synchronize]
    branches: [develop]
    paths-ignore:
      - '.claude/**'
      - '.cursor/**'
      - 'contributing/**'
      - 'CONTRIBUTING.md'
      - 'docs/**'
      - '**/README*'
      - 'SECURITY*'
      - 'CODE_OF_CONDUCT*'
      - 'CHANGELOG*'
      - '**/CHANGELOG*'

jobs:
  pr-validation:
    uses: salesforcecli/github-workflows/.github/workflows/validatePR.yml@main
  code-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ vars.NODE_VERSION || 'lts/*' }}
          cache: npm
      - uses: salesforcecli/github-workflows/.github/actions/npmInstallWithRetries@main
      - run: npm run compile -w @salesforce/eslint-plugin-vscode-extensions
        name: Compile ESLint rules
      - name: Lint
        run: npm run lint
