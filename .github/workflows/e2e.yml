name: End to End Tests
on:
  workflow_run:
    workflows:
      - Nightly Build Develop
      - Test, Build, and Release
      - Create and Test Beta Release Branch
    types:
      - completed

  workflow_call:
    inputs:
      vscodeVersion:
        description: 'VSCode Version'
        required: false
        type: string
      runId:
        description: 'Run ID of the workflow run that created the vsixes'
        required: true
        type: string

  workflow_dispatch:
    inputs:
      vscodeVersion:
        description: 'VSCode Version'
        required: false
        type: string
      runId:
        description: 'Run ID of the workflow run that created the vsixes'
        required: true
        type: string

jobs:
  # calculate-min-vscode-version: removed with LSP_min_vscode_version (its only consumer) — W-22973351

  # LSP / LSP_min_vscode_version: removed — lspE2E.yml deleted once its last WDIO suite (auraLsp.e2e)
  # migrated to Playwright (auraE2E.yml, run via playwright-aura below). lwc/visualforce LSP suites
  # were migrated earlier. — W-22973351

  playwright-vscode-ext:
    if: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' || github.event_name != 'workflow_run' }}
    uses: ./.github/workflows/playwrightVscodeExtE2E.yml
    secrets: inherit
    with:
      vscode_version: ${{ inputs.vscodeVersion }}

  playwright-services:
    if: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' || github.event_name != 'workflow_run' }}
    uses: ./.github/workflows/servicesE2E.yml
    secrets: inherit
    with:
      vscode_version: ${{ inputs.vscodeVersion }}

  playwright-metadata:
    if: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' || github.event_name != 'workflow_run' }}
    uses: ./.github/workflows/metadataE2E.yml
    secrets: inherit
    with:
      vscode_version: ${{ inputs.vscodeVersion }}

  playwright-apex-log:
    if: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' || github.event_name != 'workflow_run' }}
    uses: ./.github/workflows/apexLogE2E.yml
    secrets: inherit
