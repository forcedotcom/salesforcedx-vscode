name: Copyright Year Bump

on:
  workflow_dispatch:
  schedule:
    # 06:00 UTC on January 2nd — runs once per year, after the year flips
    - cron: '0 6 2 1 *'

jobs:
  bump-copyright-year:
    name: Bump copyright year
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: develop

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: npm

      - name: Install dependencies
        uses: salesforcecli/github-workflows/.github/actions/npmInstallWithRetries@main

      - name: Compile (eslint config needs eslint-local-rules built)
        run: npm run compile

      - name: Run eslint --fix to rewrite stale copyright headers
        run: npx eslint --fix 'packages/*/src/**/*.ts' 'packages/*/test/**/*.ts'

      - name: Determine current year
        id: year
        run: echo "value=$(date -u +'%Y')" >> $GITHUB_OUTPUT

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

          BRANCH="automated/copyright-year-${{ steps.year.outputs.value }}"
          git checkout -b "$BRANCH"

          if git diff --quiet; then
            echo "No stale copyright headers — nothing to do."
            exit 0
          fi

          git add -A
          git commit -m "chore: bump copyright year to ${{ steps.year.outputs.value }}"
          git push --set-upstream origin "$BRANCH"

          gh pr create \
            --title "chore: bump copyright year to ${{ steps.year.outputs.value }}" \
            --body "Automated copyright header sweep for ${{ steps.year.outputs.value }}. Generated by the [Copyright Year Bump](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) workflow." \
            --base develop \
            --head "$BRANCH"
