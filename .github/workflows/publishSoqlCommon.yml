name: Publish soql-common Package to npm

on:
  workflow_dispatch:

jobs:
  bump-and-tag:
    name: Bump patch version and create tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      version: ${{ steps.bump.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.IDEE_GH_TOKEN }}
          ref: develop
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ vars.NODE_VERSION || 'lts/*' }}
      - uses: ./.github/actions/gitConfig
        with:
          email: ${{ secrets.IDEE_GH_EMAIL }}
      - name: Bump patch version
        id: bump
        working-directory: packages/soql-common
        run: |
          npm version patch --no-git-tag-version
          VERSION=$(node -pe "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      - name: Commit and push version bump
        run: |
          git add packages/soql-common/package.json
          git commit -m "chore: bump @salesforce/soql-common to v${{ steps.bump.outputs.version }}"
          git push
      - name: Create and push tag
        id: tag
        run: |
          TAG="soql-common-v${{ steps.bump.outputs.version }}"
          git tag "$TAG"
          git push origin "$TAG"
          echo "tag=$TAG" >> $GITHUB_OUTPUT

  publish:
    name: Build and publish to npm
    runs-on: ubuntu-latest
    needs: bump-and-tag
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump-and-tag.outputs.tag }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ vars.NODE_VERSION || 'lts/*' }}
          registry-url: 'https://registry.npmjs.org'
      - uses: salesforcecli/github-workflows/.github/actions/npmInstallWithRetries@main
      - name: Compile package
        working-directory: packages/soql-common
        run: npm run compile
      - name: Publish to npm
        working-directory: packages/soql-common
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
