name: Publish soql-common Package to npm

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish (e.g., soql-common-v1.0.4). Required for manual runs.'
        required: true
        type: string

jobs:
  publish:
    name: Build and publish to npm
    if: github.event_name == 'workflow_dispatch' || startsWith(github.event.release.tag_name, 'soql-common-v')
    uses: salesforcecli/github-workflows/.github/workflows/npmPublish.yml@main
    with:
      githubTag: ${{ github.event.release.tag_name || github.event.inputs.tag }}
      packageManager: npm
      nodeVersion: ${{ vars.NODE_VERSION || 'lts/*' }}
      packagePath: ./packages/soql-common
      prerelease: false
    secrets:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
