name: Apex Testing E2E (Playwright)

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'packages/salesforcedx-vscode-apex-testing/**'
      - 'packages/salesforcedx-vscode-services/**'
      - 'packages/playwright-vscode-ext/**'
      - '.github/workflows/apexTestingE2E.yml'

jobs:
  e2e-web:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      MINIMAL_ORG_ALIAS: minimalTestOrg
      SFDX_AUTH_URL: ${{ secrets.SFDX_AUTH_URL_E2E }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Salesforce CLI
        run: npm i -g @salesforce/cli

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers and OS deps
        run: npx playwright install chromium --with-deps

      - name: Auth to dev hub (global)
        run: echo "$SFDX_AUTH_URL" | sf org login sfdx-url --set-default-dev-hub --alias hub --sfdx-url-stdin
        shell: bash

      - name: Generate minimal project
        shell: bash
        run: sf project generate -n minimal-project

      - name: Create scratch org
        shell: bash
        run: |
          sf org create scratch -y 1 -d -f config/project-scratch-def.json -a "$MINIMAL_ORG_ALIAS" --json --wait 30
        working-directory: minimal-project

      - name: Run Apex Testing E2E tests (parallel)
        id: parallel-run
        continue-on-error: true
        env:
          CI: 1
          MINIMAL_ORG_ALIAS: minimalTestOrg
        run: |
          npm run test:web -w salesforcedx-vscode-apex-testing -- --reporter=html

      - name: Retry failed tests (sequential)
        if: steps.parallel-run.outcome == 'failure'
        env:
          CI: 1
          MINIMAL_ORG_ALIAS: minimalTestOrg
          E2E_SEQUENTIAL: 1
        run: |
          npm run test:web -w salesforcedx-vscode-apex-testing -- --last-failed --reporter=html

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-apex-testing-web
          path: packages/salesforcedx-vscode-apex-testing/playwright-report
          if-no-files-found: ignore

      - name: Upload Playwright Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results-apex-testing-web
          path: packages/salesforcedx-vscode-apex-testing/test-results
          if-no-files-found: ignore

      - name: Cleanup scratch org
        if: always()
        continue-on-error: true
        run: |
          sf org delete scratch -o "$MINIMAL_ORG_ALIAS" --no-prompt || true

  e2e-desktop:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      matrix:
        os: [macos-latest, windows-latest]
      fail-fast: false

    env:
      MINIMAL_ORG_ALIAS: minimalTestOrg
      SFDX_AUTH_URL: ${{ secrets.SFDX_AUTH_URL_E2E }}
      VSCODE_DESKTOP: 1
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Salesforce CLI
        run: npm i -g @salesforce/cli

      - name: Auth to dev hub (global)
        run: echo "$SFDX_AUTH_URL" | sf org login sfdx-url --set-default-dev-hub --alias hub --sfdx-url-stdin
        shell: bash

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers and OS deps
        run: npx playwright install chromium --with-deps

      - name: Generate minimal project
        shell: bash
        run: sf project generate -n minimal-project

      - name: Create scratch org
        shell: bash
        run: |
          sf org create scratch -y 1 -d -f config/project-scratch-def.json -a "$MINIMAL_ORG_ALIAS" --json --wait 30
        working-directory: minimal-project

      - name: Run Apex Testing E2E tests (parallel)
        id: parallel-run
        continue-on-error: true
        env:
          CI: 1
          VSCODE_DESKTOP: 1
          MINIMAL_ORG_ALIAS: minimalTestOrg
        run: |
          npm run test:desktop -w salesforcedx-vscode-apex-testing -- --reporter=html

      - name: Retry failed tests (sequential)
        if: steps.parallel-run.outcome == 'failure'
        env:
          CI: 1
          VSCODE_DESKTOP: 1
          MINIMAL_ORG_ALIAS: minimalTestOrg
          E2E_SEQUENTIAL: 1
        run: |
          npm run test:desktop -w salesforcedx-vscode-apex-testing -- --last-failed --reporter=html

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-apex-testing-desktop-${{ matrix.os }}
          path: packages/salesforcedx-vscode-apex-testing/playwright-report
          if-no-files-found: ignore

      - name: Upload Playwright Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results-apex-testing-desktop-${{ matrix.os }}
          path: packages/salesforcedx-vscode-apex-testing/test-results
          if-no-files-found: ignore

      - name: Cleanup scratch org
        if: always()
        continue-on-error: true
        shell: bash
        run: |
          sf org delete scratch -o "$MINIMAL_ORG_ALIAS" --no-prompt || true
