name: Services E2E (Playwright)

on:
  workflow_dispatch:
  push:
    branches-ignore: [main, develop]

jobs:
  e2e-web:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      MINIMAL_ORG_ALIAS: minimalTestOrg
      SFDX_AUTH_URL: ${{ secrets.SFDX_AUTH_URL_E2E }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - uses: google/wireit@setup-github-actions-caching/v2

      - name: Install dependencies
        run: npm ci

      # Try E2E tests first. When wireit cache hits, it skips the command and exits 0—we never need CLI, orgs, or Playwright.
      # When cache misses, Playwright runs and fails fast (no chromium). We then run full setup below and retry.
      - name: Try E2E tests
        id: try-run
        continue-on-error: true
        env:
          CI: 1
        run: |
          npm run test:web -w salesforcedx-vscode-services -- --reporter=html

      # Only run expensive setup when try-run failed (cache miss). On cache hit we never reach these steps.
      - name: Install Salesforce CLI
        if: steps.try-run.outcome == 'failure'
        run: |
          npm i -g @salesforce/cli

      - name: Generate minimal project
        if: steps.try-run.outcome == 'failure'
        shell: bash
        run: sf project generate -n minimal-project

      - name: create scratch org
        if: steps.try-run.outcome == 'failure'
        # the tests expect a scratch org with a certain alias but don't use the directory directly
        shell: bash
        run: |
          echo "$SFDX_AUTH_URL" | sf org login sfdx-url --set-default-dev-hub --sfdx-url-stdin
          sf org create scratch -y 1 -d -f config/project-scratch-def.json -a "$MINIMAL_ORG_ALIAS" --json
        working-directory: minimal-project

      - name: Run Services E2E tests (parallel)
        if: steps.try-run.outcome == 'failure'
        id: parallel-run
        continue-on-error: true
        env:
          CI: 1
        run: |
          npm run test:web -w salesforcedx-vscode-services -- --reporter=html

      - name: Retry failed tests (sequential)
        if: steps.try-run.outcome == 'failure' && steps.parallel-run.outcome == 'failure'
        env:
          CI: 1
          E2E_SEQUENTIAL: 1
        run: |
          npm run test:web -w salesforcedx-vscode-services -- --last-failed --reporter=html

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-web
          path: packages/salesforcedx-vscode-services/playwright-report
          if-no-files-found: ignore

      - name: Upload Playwright Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results-web
          path: packages/salesforcedx-vscode-services/test-results
          if-no-files-found: ignore

      - name: Cleanup scratch org
        if: always() && steps.try-run.outcome == 'failure'
        continue-on-error: true
        run: |
          sf org delete scratch -o "$MINIMAL_ORG_ALIAS" --no-prompt || true
