<template>
  <div class="section-container">
    <div class="section_label-container">
      <label for="query-limit"
        >{i18n.label_limit}<template if:true={hasError}
          ><span class="text-color-required" data-el-has-error
            >*</span
          ></template
        ></label
      >
    </div>
    <div class="section_selection-container">
      <input
        id="query-limit"
        type="number"
        name="limit"
        value={limit}
        placeholder={i18n.placeholder_limit}
        min="0"
        data-el-limit
        onchange={handleLimitChange}
        onkeyup={handleLimitChange}
      />
    </div>
  </div>
  <div class="section-container">
    <div class="section_label-container">
      <label for="query-max-rows">{i18n.label_max_rows}</label>
    </div>
    <div class="section_selection-container">
      <input
        id="query-max-rows"
        type="number"
        name="maxRows"
        value={maxRows}
        placeholder={i18n.placeholder_max_rows}
        min="1"
        data-el-max-rows
        onchange={handleMaxRowsChange}
        onkeyup={handleMaxRowsChange}
      />
    </div>
  </div>
</template>
