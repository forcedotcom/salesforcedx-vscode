<template>
  <main>
    <header class="querybuilder-header">
      <querybuilder-header
        class={theme}
        onheader__run_query={handleRunQuery}
        onheader__get_query_plan={handleGetQueryPlan}
        is-running={isQueryRunning}
        has-no-default-org={hasNoDefaultOrg}
        is-query-plan-running={isQueryPlanRunning}
        is-query-valid={isQueryValid}
      ></querybuilder-header>
    </header>
    <template if:true={showNoDefaultOrgNotification}>
      <div class="info-notification">
        <div class="info-notification__message">
          {i18n.label_no_default_org}
        </div>
        <div class="info-notification__dismiss">
          <button
            class="text-center"
            onclick={handleSetDefaultOrg}
          >
            {i18n.action_set_default_org}
          </button>
        </div>
      </div>
    </template>
    <template if:true={showBlockedQueryBuilder}>
      <div class="warning-notification">
        <div class="warning-notification__message">
          <template if:true={showUnsupportedNotification}>
            <strong>{i18n.label_unsupported_query_title}</strong>
            <p>{i18n.label_unsupported_query_run_info}</p>
            <p>{i18n.label_unsupported_query_edit_info}</p>
          </template>
          <template if:true={showSyntaxErrorNotification}>
            <strong>{i18n.label_syntax_error_title}</strong>
            <p>{i18n.label_syntax_error_edit_info}</p>
          </template>
          <ol type="number">
            <template for:each={notifications} for:item="notification"
              ><li key={notification.index}>
                {notification.item}
              </li></template
            >
          </ol>
        </div>
        <div class="warning-notification__dismiss">
          <button
            class="btn--error text-center"
            onclick={handleDismissNotifications}
          >
            {i18n.action_edit_query_anyway}
          </button>
        </div>
      </div>
    </template>
    <template if:true={showQueryBuilderForm}>
      <section class="querybuilder-from-bar">
        <querybuilder-from
          onfrom__object_selected={handleObjectChange}
          sobjects={sObjects}
          selected={query.sObject}
          has-error={hasRecoverableFromError}
          is-loading={isFromLoading}
          class={theme}
        ></querybuilder-from>
      </section>
      <article class="querybuilder-body">
        <section class="schema-tree-panel">
          <querybuilder-schema-tree
            class={theme}
            visible-nodes={treeNodes}
            active-context-path={activeContextPath}
            ontree__nodeselect={handleTreeNodeSelect}
            ontree__fieldtoggle={handleTreeFieldToggle}
            ontree__nodeexpand={handleTreeNodeExpand}
          ></querybuilder-schema-tree>
        </section>
        <section class="detail-panel">
          <querybuilder-detail-panel
            class={theme}
            context-label={activeContextLabel}
            context-path={activeContextPath}
            breadcrumbs={activeBreadcrumbs}
            available-fields={activeAvailableFields}
            selected-fields={activeSelectedFields}
            has-fields-error={hasRecoverableFieldsError}
            where-expr={activeContextData.where}
            where-fields={activeWhereFields}
            order-by-fields={activeWhereFields}
            selected-order-by-fields={activeContextData.orderBy}
            limit={activeContextData.limit}
            has-limit-error={hasRecoverableLimitError}
            is-loading={isFieldsLoading}
            sobject-metadata={activeMetadata}
            ondetail__fieldschanged={handleDetailFieldsChanged}
            ondetail__navigate={handleDetailNavigate}
            ondetail__limitchanged={handleContextLimitChanged}
            ondetail__whereselection={handleContextWhereSelection}
            ondetail__andorselection={handleContextAndOrSelection}
            ondetail__whereremoved={handleContextWhereRemoved}
            ondetail__orderbyselected={handleContextOrderBySelected}
            ondetail__orderbyremoved={handleContextOrderByRemoved}
          ></querybuilder-detail-panel>
        </section>
      </article>
    </template>
    <section class="query-preview-panel">
      <querybuilder-query-preview
        class={theme}
        soql-statement={query.originalSoqlStatement}
      ></querybuilder-query-preview>
    </section>
  </main>
</template>
