<template>
  <div class="detail-panel-container">
    <div class="detail-panel-header">
      <label class="detail-panel-title">{panelTitle}</label>
    </div>

    <div class="detail-section">
      <div class="detail-section-label">
        <label>{i18n.label_fields}</label>
        <template if:true={hasFieldsError}>
          <span class="text-color-required">*</span>
        </template>
      </div>
      <div class="detail-section-content">
        <querybuilder-custom-select
          is-loading={isLoading}
          all-options={availableFields}
          selected-options={selectedFields}
          onoption__selection={handleFieldSelection}
          placeholder-text={i18n.placeholder_search_fields}
          multiple="true"
        ></querybuilder-custom-select>
        <div class="selected-fields-container">
          <template for:each={fieldPills} for:item="field">
            <div class="selected-field" key={field}>
              {field}
              <span
                role="button"
                class="pointer delete-trigger"
                data-field={field}
                onclick={handleFieldRemoved}
              >X</span>
            </div>
          </template>
        </div>
      </div>
    </div>

    <querybuilder-where
      where-expr={whereExpr}
      where-fields={whereFields}
      is-loading={isLoading}
      sobject-metadata={sobjectMetadata}
    ></querybuilder-where>

    <querybuilder-order-by
      selected-order-by-fields={selectedOrderByFields}
      order-by-fields={orderByFields}
      sobject-metadata={sobjectMetadata}
      has-error={hasOrderByError}
      is-loading={isLoading}
    ></querybuilder-order-by>

    <querybuilder-limit
      limit={limit}
      has-error={hasLimitError}
    ></querybuilder-limit>
  </div>
</template>
