<template>
  <div class="section-container">
    <div class="section_label-container">
      <label>
        {i18n.label_fields}
        <template if:true={hasError}
          ><span class="text-color-required" data-el-has-error>*</span></template
        >
      </label>
    </div>
    <div class="section_selection-container">

      <!-- Breadcrumb shown while drilled in -->
      <template if:true={isDrilledIn}>
        <div class="fields-breadcrumb">
          <span
            role="button"
            class="pointer breadcrumb-back"
            onclick={handleBackOneLevel}
            title={i18n.action_back_to_fields}
          >{backArrow}</span>
          <span class="breadcrumb-label">{breadcrumbLabel}</span>
        </div>
      </template>

      <!-- 3-column selector panel -->
      <div class="fields-columns">

        <!-- Left column: child sObjects (subqueries) -->
        <div class="fields-column fields-column--left">
          <div class="fields-column__header">{i18n.label_subqueries}</div>
          <div class="fields-column__list">
            <template if:true={isLoading}>
              <p class="fields-column__item fields-column__item--disabled">{i18n.label_loading}</p>
            </template>
            <template if:false={isLoading}>
              <template if:false={hasLeftItems}>
                <p class="fields-column__item fields-column__item--disabled">—</p>
              </template>
              <template if:true={hasLeftItems}>
                <template for:each={_leftItems} for:item="name">
                  <p
                    key={name}
                    class="fields-column__item"
                    data-name={name}
                    onclick={handleLeftItemClick}
                  >{name}</p>
                </template>
              </template>
            </template>
          </div>
        </div>

        <!-- Middle column: base fields -->
        <div class="fields-column fields-column--middle">
          <div class="fields-column__header">{i18n.label_fields}</div>
          <div class="fields-column__list">
            <template if:true={isLoading}>
              <p class="fields-column__item fields-column__item--disabled">{i18n.label_loading}</p>
            </template>
            <template if:false={isLoading}>
              <template for:each={_middleItems} for:item="name">
                <p
                  key={name}
                  class="fields-column__item"
                  data-name={name}
                  onclick={handleMiddleItemClick}
                >{name}</p>
              </template>
            </template>
          </div>
        </div>

        <!-- Right column: parent relationships -->
        <div class="fields-column fields-column--right">
          <div class="fields-column__header">{i18n.label_relationships}</div>
          <div class="fields-column__list">
            <template if:true={isLoading}>
              <p class="fields-column__item fields-column__item--disabled">{i18n.label_loading}</p>
            </template>
            <template if:false={isLoading}>
              <template if:false={hasRightItems}>
                <p class="fields-column__item fields-column__item--disabled">—</p>
              </template>
              <template if:true={hasRightItems}>
                <template for:each={_rightItems} for:item="name">
                  <p
                    key={name}
                    class="fields-column__item"
                    data-name={name}
                    onclick={handleRightItemClick}
                  >{name}</p>
                </template>
              </template>
            </template>
          </div>
        </div>

      </div><!-- end .fields-columns -->

      <!-- Selected base field pills -->
      <div class="selected-fields-container">
        <template for:each={selectedFields} for:item="field">
          <div class="selected-field" key={field}>
            {field}
            <span
              role="button"
              class="pointer delete-trigger"
              onclick={handleFieldRemoved}
              data-field={field}
            >X</span>
          </div>
        </template>
      </div>

      <!-- Relationship boxes -->
      <template for:each={flatRelationshipPillGroups} for:item="relGroup">
        <div key={relGroup.pathKey} class="relationship-pill-group">
          <div class="relationship-pill-header">
            <span class="relationship-pill-name">{relGroup.groupLabel}</span>
            <span
              role="button"
              class="pointer delete-trigger"
              onclick={handleRelationshipGroupRemoved}
              data-path={relGroup.pathKey}
            >X</span>
          </div>
          <div class="selected-fields-container">
            <template for:each={relGroup.fields} for:item="field">
              <div class="selected-field" key={field}>
                {field}
                <span
                  role="button"
                  class="pointer delete-trigger"
                  onclick={handleRelationshipPillFieldRemoved}
                  data-path={relGroup.pathKey}
                  data-field={field}
                >X</span>
              </div>
            </template>
          </div>
        </div>
      </template>

      <!-- Subquery boxes -->
      <template for:each={flatSubqueryPillGroups} for:item="sq">
        <div key={sq.pathKey} class="relationship-pill-group">
          <div class="relationship-pill-header">
            <span class="relationship-pill-name">{sq.groupLabel}</span>
            <span
              role="button"
              class="pointer delete-trigger"
              onclick={handleSubqueryRemoved}
              data-path={sq.pathKey}
            >X</span>
          </div>
          <div class="selected-fields-container">
            <template for:each={sq.fields} for:item="field">
              <div class="selected-field" key={field}>
                {field}
                <span
                  role="button"
                  class="pointer delete-trigger"
                  onclick={handleSubqueryFieldRemoved}
                  data-path={sq.pathKey}
                  data-field={field}
                >X</span>
              </div>
            </template>
          </div>
        </div>
      </template>

    </div><!-- end .section_selection-container -->
  </div>
</template>
