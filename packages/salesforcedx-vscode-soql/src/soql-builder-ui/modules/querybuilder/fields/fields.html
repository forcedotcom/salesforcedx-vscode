<template>
  <div class="section-container">
    <div class="section_label-container">
      <label
        >{i18n.label_fields}
        <template if:true={hasError}
          ><span class="text-color-required" data-el-has-error
            >*</span
          ></template
        ></label
      >
    </div>
    <div class="section_selection-container">

      <!-- Breadcrumb when drilled in -->
      <template if:true={isDrilledIn}>
        <div class="relationship-breadcrumb">
          <span
            role="button"
            class="breadcrumb-back pointer"
            onclick={handleBackOneLevel}
            title={i18n.action_back_to_fields}
          >{backArrow}</span>
          <span class="breadcrumb-label">{breadcrumbLabel}</span>
        </div>
      </template>

      <querybuilder-custom-select
        is-loading={isLoading}
        all-options={_displayFields}
        selected-options={activeSelectedOptions}
        onoption__selection={handleFieldSelection}
        placeholder-text={i18n.placeholder_search_fields}
        multiple="true"
      ></querybuilder-custom-select>

      <!-- Plain field pills -->
      <div class="pills-gap selected-fields-container">
        <template for:each={selectedFields} for:item="field">
          <div class="selected-field" key={field}>
            {field}
            <span
              role="button"
              class="pointer delete-trigger"
              onclick={handleFieldRemoved}
              data-field={field}
            >X</span>
          </div>
        </template>
      </div>

      <!-- Relationship boxes -->
      <template for:each={relationships} for:item="rel">
        <div key={rel.relationshipName} class="relationship-pill-group">
          <div class="relationship-pill-header">
            <span class="relationship-pill-name">{rel.relationshipName}</span>
            <span
              role="button"
              class="pointer delete-trigger"
              onclick={handleRelationshipRemoved}
              data-relationship={rel.relationshipName}
            >X</span>
          </div>
          <div class="selected-fields-container">
            <template for:each={rel.fields} for:item="field">
              <div class="selected-field" key={field}>
                {field}
                <span
                  role="button"
                  class="pointer delete-trigger"
                  onclick={handleRelationshipFieldRemoved}
                  data-relationship={rel.relationshipName}
                  data-field={field}
                >X</span>
              </div>
            </template>
          </div>
        </div>
      </template>

      <!-- Subquery boxes -->
      <template for:each={subqueries} for:item="sq">
        <div key={sq.relationshipName} class="relationship-pill-group">
          <div class="relationship-pill-header">
            <span class="relationship-pill-name">{sq.relationshipName}</span>
            <span
              role="button"
              class="pointer delete-trigger"
              onclick={handleSubqueryRemoved}
              data-relationship={sq.relationshipName}
            >X</span>
          </div>
          <div class="selected-fields-container">
            <template for:each={sq.fields} for:item="field">
              <div class="selected-field" key={field}>
                {field}
                <span
                  role="button"
                  class="pointer delete-trigger"
                  onclick={handleSubqueryFieldRemoved}
                  data-relationship={sq.relationshipName}
                  data-field={field}
                >X</span>
              </div>
            </template>
          </div>
        </div>
      </template>

    </div>
  </div>
</template>
